openapi: 3.0.3
info:
  title: Athena Auth API
  description: |
    A Rust-based authentication API built with Axum and athena_rs for database operations.
    
    ## Features
    - User Authentication with JWT tokens
    - API Key Management
    - Secure password handling with bcrypt
    
    ## Authentication
    Protected endpoints require a Bearer token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```
  version: 0.1.0
  contact:
    name: Xylex Group
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: http://0.0.0.0:3000
    description: Local server

tags:
  - name: Authentication
    description: User registration, login, and token management
  - name: API Keys
    description: API key creation, listing, and revocation

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email and password
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
            example:
              email: user@example.com
              password: secure_password123
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      description: Authenticate a user and receive a JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@example.com
              password: secure_password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify:
    get:
      tags:
        - Authentication
      summary: Verify JWT token
      description: Verify the validity of the current JWT token
      operationId: verify
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  user_id:
                    type: string
                    format: uuid
                    example: 123e4567-e89b-12d3-a456-426614174000
                  email:
                    type: string
                    format: email
                    example: user@example.com
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user information
      description: Retrieve information about the currently authenticated user
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/api-keys:
    post:
      tags:
        - API Keys
      summary: Create a new API key
      description: Generate a new API key for the authenticated user
      operationId: createApiKey
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKey'
            example:
              name: My API Key
              expires_at: "2026-12-31T23:59:59Z"
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags:
        - API Keys
      summary: List all API keys
      description: Retrieve all API keys for the authenticated user
      operationId: listApiKeys
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API keys retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyInfo'
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/api-keys/{id}:
    delete:
      tags:
        - API Keys
      summary: Revoke an API key
      description: Deactivate an API key by ID
      operationId: revokeApiKey
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the API key to revoke
          schema:
            type: string
            format: uuid
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '204':
          description: API key revoked successfully
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - API key belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login endpoint

  schemas:
    CreateUser:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          description: User's password (will be hashed)
          example: secure_password123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: user@example.com
        password:
          type: string
          format: password
          description: User's password
          example: secure_password123

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier
          example: 123e4567-e89b-12d3-a456-426614174000
        email:
          type: string
          format: email
          description: User's email address
          example: user@example.com
        created_at:
          type: string
          format: date-time
          description: Timestamp when the user was created
          example: "2024-01-01T12:00:00Z"

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        token_type:
          type: string
          description: Token type (always "Bearer")
          example: Bearer
        expires_in:
          type: integer
          description: Token expiration time in seconds
          example: 86400

    CreateApiKey:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Descriptive name for the API key
          example: My API Key
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration date for the API key
          example: "2026-12-31T23:59:59Z"

    ApiKeyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique API key identifier
          example: 123e4567-e89b-12d3-a456-426614174000
        name:
          type: string
          description: Descriptive name for the API key
          example: My API Key
        key:
          type: string
          description: The actual API key (only returned on creation)
          example: ak_1234567890abcdef
        created_at:
          type: string
          format: date-time
          description: Timestamp when the API key was created
          example: "2024-01-01T12:00:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration date for the API key
          example: "2026-12-31T23:59:59Z"

    ApiKeyInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique API key identifier
          example: 123e4567-e89b-12d3-a456-426614174000
        name:
          type: string
          description: Descriptive name for the API key
          example: My API Key
        created_at:
          type: string
          format: date-time
          description: Timestamp when the API key was created
          example: "2024-01-01T12:00:00Z"
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the API key was last used
          example: "2024-01-15T10:30:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration date for the API key
          example: "2026-12-31T23:59:59Z"
        is_active:
          type: boolean
          description: Whether the API key is active
          example: true

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: Invalid credentials
